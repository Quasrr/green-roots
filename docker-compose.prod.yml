services:
  greenroots-db:
    image: postgres:17
    container_name: greenroots-db
    restart: unless-stopped
    networks:
      - greenroots-network
    volumes:
      - greenroots-db-volume:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  greenroots-redis:
    image: redis:7-alpine
    container_name: greenroots-redis
    restart: unless-stopped
    networks:
      - greenroots-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  greenroots-api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: greenroots-api
    restart: unless-stopped
    environment:
      PORT: ${API_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@greenroots-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://greenroots-redis:6379
      NODE_ENV: production
      JWT_SECRET: ${API_JWT_SECRET}
      EMAILJS_SERVICE_ID: ${EMAILJS_SERVICE_ID}
      EMAILJS_TEMPLATE_ID: ${EMAILJS_TEMPLATE_ID}
      EMAILJS_PUBLIC_KEY: ${EMAILJS_PUBLIC_KEY}
      EMAILJS_PRIVATE_KEY: ${EMAILJS_PRIVATE_KEY}
      GMAIL_USER: ${GMAIL_USER}
      FRONT_URL: https://greenroots.duckdns.org
    ports:
      - "3000"
    networks:
      - greenroots-network
    depends_on:
      greenroots-db:
        condition: service_healthy
      greenroots-redis:
        condition: service_healthy

networks:
  greenroots-network:

volumes:
  greenroots-db-volume: